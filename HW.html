<!DOCTYPE html>
<html>
<head>
<style>
  table 
  {
    background-color: white;
    margin: 20px auto;
  }

  td {
    width: 60px;
    height: 90px;
    border: 2px solid #555;
    position: relative;
    text-align: center;
    font-size: 40px;
    font-family: serif;
    color: rgb(59, 174, 223);
    font-weight: bold;
    overflow: hidden;
  }

  td::before, td::after {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* 1. تلوين الصفوف الزوجية بالأحمر باستخدام nth-child */
  tr:nth-child(even) td::before {
    background-color: rgb(11, 230, 19); /* أحمر */
  }

  /* 2. تلوين الأعمدة الزوجية بالأصفر باستخدام nth-child */
  td:nth-child(even)::after {
    background-color: rgb(174, 0, 255); /* أصفر */
    
    /* -------------------------------------------------- */
    /* السطر السحري: مزج اللون الأصفر مع ما تحته (الأحمر) */
    mix-blend-mode: multiply; 
    /* -------------------------------------------------- */
  }

  /* لجعل الرقم يظهر دائماً في المقدمة */
  .content {
    position: relative;
    z-index: 10;
  }

  /* تأثير عند المرور بالماوس (اختياري كما في الطريقة 2) */
  tr.clickable-row { cursor: pointer; }
  tr:hover { filter: brightness(0.9); }
</style>
</head>
<body>

<table border="1">
  <tr class="clickable-row" onclick="window.location='https://www.google.com';">
