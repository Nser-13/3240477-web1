<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" /><!--عشان اللغه العربيه تظهر بشكل واضح ومنسق-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /><!--تأقلم الصفحه مع الجهاز-->
  <title>AL-hennawi GOLDEN PAINT</title>
  <link rel="icon" type="image/png" href="C:\Users\DELL\Desktop\video&image\car\favicon-32x32.png">
  <link rel="icon" type="image/x-icon" href="C:\Users\DELL\Desktop\video&image\car\favicon-32x32.png">
  <link rel="apple-touch-icon" href="C:\Users\DELL\Desktop\video&image\car\apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" /> <!-- خط القاهرة من Google Fonts -->
  <link rel="stylesheet" href="sign in.css" />
</head>
<body>
  <!-- تأثيرات خلفية-->
  <div class="bg-particles">
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
  </div>
  <main class="container">
    <div class="form-card">
      <div class="form-header">
        <!--رسم صوره anonymous-->
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <h1>تسجيل دخول</h1>
        <p class="subtitle">أدخل بياناتك</p>
      </div>
      <!--bar اكتمال النوذج-->
      <div class="progress-bar-container">
        <div class="progress-label">
          <span>اكتمال النموذج</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
      <form id="registration-form" novalidate>
        <!--الخانه 1-->
        <div class="field-group" id="group-name">
          <label for="full-name">
            <!--رسم صوره anonymous-->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            الاسم الكامل
            <span class="required">*</span>
          </label>
          <div class="input-wrapper">
            <input type="text" id="full-name" placeholder="أدخل اسمك الكامل" required />
            <div class="field-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
          </div>
          <!--جمله error-->
          <span class="error-msg" id="err-name">يرجى إدخال اسمك الكامل (3 أحرف على الأقل)</span>
        </div>
        <!--الخانه 2-->
        <div class="field-group" id="group-email">
          <label for="email">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            البريد الإلكتروني
            <span class="required">*</span>
          </label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="example@email.com" dir="ltr" required />
            <div class="field-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </div>
          </div>
          <!--جمله error-->
          <span class="error-msg" id="err-email">يرجى إدخال بريد إلكتروني صحيح</span>
        </div>
        <!--الخانه 3-->
        <div class="field-group" id="group-phone">
          <label for="phone">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            رقم الهاتف (نقس رقم الواتساب)
            <span class="required">*</span>
          </label>
          <div class="input-wrapper">
            <input type="tel" id="phone" placeholder="78xxxxxxx" dir="ltr" required />
            <div class="field-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
            </div>
          </div>
          <span class="error-msg" id="err-phone">يرجى إدخال رقم هاتف صحيح (مثال: 78xxxxxxx)</span><!--جمله error-->
        </div>
        <!--الخانه 4-->
        <div class="field-group" id="group-age">
          <label for="age">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            العمر
            <span class="required">*</span>
          </label>
          <div class="input-wrapper">
            <input type="number" id="age" placeholder="أدخل عمرك" min="1" max="120" dir="ltr" required />
            <div class="field-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </div>
          </div>
          <span class="error-msg" id="err-age">يرجى إدخال عمر صحيح (بين 1 و 120 سنة)</span><!--جمله error-->
        </div>
        <!--الخانه 5-->
        <div class="field-group" id="group-city">
          <label for="city">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            المدينة
            <span class="required">*</span>
          </label>
          <div class="input-wrapper">
            <select id="city" required>
              <option value="" disabled selected>اختر مدينتك</option>
              <option value="Zarqa">الزرقاء</option>
              <option value="Marqa">ماركا</option>
              <option value="AL-Bayader ">البيادر</option>
              <option value="AL-Qwesmah">القويسمة</option>
              <option value="other">أخرى</option>
            </select>
            <div class="field-icon select-arrow">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
          </div>
          <span class="error-msg" id="err-city">يرجى اختيار مدينتك</span><!--جمله error-->
        </div>
        <button type="submit" id="submit-btn" class="submit-btn">
          <span class="btn-text">الذهاب للصفحة التالية</span>
          <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>

      </form>
    </div>
  </main>
  <script src="sign in.js"></script>
</body>
</html>
